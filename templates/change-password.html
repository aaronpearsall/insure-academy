<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsureAcademy - Change Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon" style="width:44px;height:44px;font-size:15px;">IA</div>
      </div>
      <h1 class="login-title">Change Password</h1>
      <p class="login-subtitle">Update your account password</p>

      {% if error %}
      <div class="error-alert">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label class="form-label" for="current_password">Current Password</label>
          <input class="form-input" type="password" id="current_password" name="current_password" placeholder="Enter your current password" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="new_password">New Password</label>
          <input class="form-input" type="password" id="new_password" name="new_password" placeholder="At least 8 characters" required minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm New Password</label>
          <input class="form-input" type="password" id="confirm_password" name="confirm_password" placeholder="Repeat new password" required>
        </div>
        <button type="submit" class="btn btn-primary login-submit">Update Password</button>
      </form>

      <p class="login-footer">
        <a href="{{ url_for('index') }}">← Back to Dashboard</a>
      </p>
    </div>
  </div>
</body>
</html>
