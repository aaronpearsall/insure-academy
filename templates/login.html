<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insurance Agent - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon" style="width:44px;height:44px;font-size:15px;">IA</div>
      </div>
      <h1 class="login-title">Insurance Agent</h1>
      <p class="login-subtitle">Sign in to access your study dashboard</p>

      {% if error %}
      <div class="error-alert">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary login-submit">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
