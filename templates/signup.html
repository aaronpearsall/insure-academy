<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsureAcademy - Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon" style="width:44px;height:44px;font-size:15px;">IA</div>
      </div>
      <h1 class="login-title">InsureAcademy</h1>
      <p class="login-subtitle">Create your account to get started</p>

      {% if error %}
      <div class="error-alert">{{ error }}</div>
      {% endif %}

      {% if google_client_id %}
      <a href="{{ url_for('auth_google') }}" class="btn btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.59c1.5-1.39 2.3-3.43 2.3-5.86z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2c-.72.48-1.64.77-2.7.77-2.08 0-3.85-1.4-4.68-3.35H1.58v2.06C2.91 15.07 5.47 17 8.98 17z"/><path fill="#FBBC05" d="M4.3 10.48c-.17-.5-.27-1.03-.27-1.58s.1-1.08.27-1.58V5.36H1.58C.99 6.48.6 7.7.6 8.9s.39 2.42.98 3.54l2.72-2.12z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3C12.95 1.7 11.14 1 8.98 1 5.47 1 2.91 2.93 1.58 5.36l2.72 2.12c.83-1.95 2.6-3.35 4.68-3.35z"/></svg>
        Sign up with Google
      </a>
      <div class="login-divider">or</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm Password</label>
          <input class="form-input" type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required>
        </div>
        <button type="submit" class="btn btn-primary login-submit">Create Account</button>
      </form>

      <p class="login-footer">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
      </p>
    </div>
  </div>
</body>
</html>
